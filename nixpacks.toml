# ============================================================
#  nixpacks.toml — AELA ERP (Railway)
#  Provee librerías del sistema que el Chrome de Puppeteer necesita.
#  Puppeteer descarga su propio Chrome durante npm install.
# ============================================================

[phases.setup]
nixPkgs = [
  # Node.js debe incluirse explícitamente al usar setup personalizado
  "nodejs_20",
  "postgresql",
  "nss",
  "nspr",
  "alsa-lib",
  "atk",
  "at-spi2-atk",
  "cups",
  "libdrm",
  "expat",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "pango",
  "cairo",
  "mesa",
  "glib",
  "dbus",
  "gdk-pixbuf",
  "gtk3",
]
