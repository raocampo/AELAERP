# ============================================================
#  railway.toml — AELA ERP Backend (Railway)
#  Configuración para despliegue automático en Railway
# ============================================================

[build]
builder = "NIXPACKS"
# PUPPETEER_CACHE_DIR dentro del proyecto para que el Chrome descargado
# durante npm install sea accesible al arrancar el servidor (mismo /app).
buildCommand = "cd backend && PUPPETEER_CACHE_DIR=/app/.puppeteer-cache npm install && npx prisma generate && npx prisma generate --schema=./prisma/schema-master.prisma"

[deploy]
# prisma migrate deploy aplica migraciones pendientes sin necesitar pg_dump.
# npm run db:migrate:safe (que usa pg_dump) puede fallar en Railway y bloquea el arranque.
startCommand = "cd backend && sh start.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
PORT = "5600"
NODE_ENV = "production"
DB_BACKUP_DIR = "/tmp/aela-backups"
# Chrome descargado por Puppeteer durante npm install.
# CACHE_DIR fijo en /app para que build y runtime usen la misma ruta.
PUPPETEER_CACHE_DIR = "/app/.puppeteer-cache"
# Dominios personalizados adicionales permitidos por CORS (aparte de FRONTEND_URL)
# Separar con coma si hay más de uno
CORS_EXTRA_ORIGINS = "https://aela.corpsimtelec.com"
