# ============================================================
#  railway.toml — AELA ERP Backend (Railway)
#  Configuración para despliegue automático en Railway
# ============================================================

[build]
builder = "NIXPACKS"
# Instalar dependencias del backend y generar Prisma clients
buildCommand = "cd backend && npm install && npx prisma generate && npx prisma generate --schema=./prisma/schema-master.prisma"

[deploy]
# Ejecutar migraciones antes de arrancar el servidor
startCommand = "cd backend && npm run db:migrate:safe && node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
PORT = "5600"
NODE_ENV = "production"
# Puppeteer descarga su propio Chrome durante npm install (más confiable en Railway).
# nixpacks.toml provee las librerías del sistema que Chrome necesita.
DB_BACKUP_DIR = "/tmp/aela-backups"
